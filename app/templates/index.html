<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wanchoo DevOps Pipeline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(to right, #1e3c72, #2a5298); color: white; font-family: 'Segoe UI', sans-serif; }
        .container { margin-top: 50px; }
        .card { background-color: rgba(255,255,255,0.1); border: none; }
        .btn-custom { background-color: #ffcc00; color: black; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container text-center">
        <h1 class="mb-4">🚀 Hello Vikas from Wanchoo DevOps Pipeline!</h1>
        <div class="card p-4">
            <p><strong>Current Time:</strong> {{ now }}</p>
            <p><strong>Your IP:</strong> {{ client_ip }}</p>
            <form method="POST" action="/feedback">
                <div class="mb-3">
                    <label for="feedback" class="form-label">Share your feedback:</label>
                    <textarea class="form-control" id="feedback" name="feedback" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-custom">Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
