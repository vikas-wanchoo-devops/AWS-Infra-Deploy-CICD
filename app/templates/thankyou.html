<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thank You</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(to right, #11998e, #38ef7d); color: white; font-family: 'Segoe UI', sans-serif; }
        .container { margin-top: 50px; }
        .card { background-color: rgba(255,255,255,0.1); border: none; }
    </style>
</head>
<body>
    <div class="container text-center">
        <h1 class="mb-4">🎉 Thank You!</h1>
        <div class="card p-4">
            <p>Your feedback has been received:</p>
            <blockquote class="blockquote">{{ feedback }}</blockquote>
            <a href="/" class="btn btn-light">Back to Home</a>
        </div>
    </div>
</body>
</html>
