name: CI-CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ✅ Ensure S3 bucket exists before Terraform init
      - name: Ensure S3 bucket exists
        run: |
          aws s3api head-bucket --bucket assaabloy-terraform-state 2>/dev/null || \
          aws s3api create-bucket --bucket assaabloy-terraform-state --region eu-north-1
          aws s3api put-bucket-versioning --bucket assaabloy-terraform-state \
            --versioning-configuration Status=Enabled

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Apply
        run: terraform -chdir=terraform apply -auto-approve

  build:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

