name: CI-CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]   # Run pipeline on pushes to main or dev branches

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      # Checkout repository code
      - uses: actions/checkout@v3

      # Configure AWS credentials from GitHub Secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Ensure S3 bucket exists before Terraform init
      - name: Ensure S3 bucket exists
        run: |
          if ! aws s3api head-bucket --bucket assaabloy-terraform-state 2>/dev/null; then
            aws s3api create-bucket \
              --bucket assaabloy-terraform-state \
              --create-bucket-configuration LocationConstraint=eu-north-1 \
              --region eu-north-1
          fi
          aws s3api put-bucket-versioning --bucket assaabloy-terraform-state \
            --versioning-configuration Status=Enabled

      # Install Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      # Initialize Terraform with S3 backend
      - name: Terraform Init
        run: terraform -chdir=terraform init

      # Apply Terraform configuration (auto-approve to skip interactive prompt)
      - name: Terraform Apply
        run: terraform -chdir=terraform apply -auto-approve

  build:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      # Checkout repository code
      - uses: actions/checkout@v3

      # Configure AWS credentials again for build job
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Login to ECR using AWS CLI
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      # Build Docker image from ./app, tag it, and push to ECR
      - name: Build and Push Docker Image
        run: |
          docker build -t assaabloy-app ./app
          docker tag assaabloy-app:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/assaabloy-app:latest
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/assaabloy-app:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      # Configure AWS credentials again for deploy job
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Deploy ECS service using deploy script
      - name: Deploy to ECS
        run: bash scripts/deploy.sh
