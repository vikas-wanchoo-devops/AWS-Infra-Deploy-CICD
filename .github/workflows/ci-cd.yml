name: CI-CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - '**'

jobs:
  terraform:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[terraform]') || endsWith(github.ref, '/terraform')
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879696522469:role/GitHubActionsCICDRole
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.6

      - name: Clear Terraform cache
        run: rm -rf terraform/.terraform terraform/.terraform.lock.hcl

      - name: Terraform Init (upgrade providers)
        run: terraform -chdir=terraform init -upgrade

      - name: Terraform Apply
        env:
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
        run: terraform -chdir=terraform apply -auto-approve

      - name: Show Terraform Outputs
        run: terraform -chdir=terraform output

  build:
    runs-on: ubuntu-latest
    needs: [terraform]
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879696522469:role/GitHubActionsCICDRole
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build and Push Docker image
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/assaabloy-app:latest
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          docker build -t $IMAGE_URI ./app
          docker push $IMAGE_URI

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879696522469:role/GitHubActionsCICDRole
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update ECS Service
        run: |
          aws ecs update-service \
            --cluster assaabloy-app-cluster \
            --service assaabloy-app-service \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}
